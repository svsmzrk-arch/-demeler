<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ödemeler">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#007aff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Odeme Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#ff3b30;--orange:#ff9500;--yellow:#f5a623;--green:#34c759;--blue:#007aff;--purple:#af52de;--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;--border:#e5e5ea;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;-webkit-tap-highlight-color:transparent;}
button{font-family:'Nunito',sans-serif;touch-action:manipulation;}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:48px 16px 12px;position:sticky;top:0;z-index:100;}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.header-title{font-size:22px;font-weight:900;}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;}
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:14px;padding:6px 4px;}
.mnav-btn{background:#fff;border:none;border-radius:10px;font-size:20px;cursor:pointer;padding:8px 16px;color:var(--blue);font-weight:900;}
.mnav-center{text-align:center;flex:1;}
.mnav-month{font-size:17px;font-weight:900;}
.mnav-year{font-size:12px;color:var(--sub);font-weight:700;}
.mnav-today{font-size:11px;color:var(--blue);font-weight:800;cursor:pointer;text-decoration:underline;margin-top:2px;min-height:16px;}
.summary{background:var(--card);margin:10px 12px 0;border-radius:16px;padding:14px 16px;}
.sum-label{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:6px;}
.sum-total{font-size:26px;font-weight:900;letter-spacing:-.5px;}
.sum-row{display:flex;gap:10px;margin-top:10px;}
.sum-chip{background:var(--bg);border-radius:10px;padding:7px 12px;flex:1;}
.sum-chip-val{font-size:15px;font-weight:900;}
.sum-chip-lbl{font-size:11px;color:var(--sub);font-weight:700;}
.bar-section{margin-top:12px;}
.bar-title{font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bar-emoji{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.bar-label{font-size:12px;font-weight:700;width:72px;flex-shrink:0;}
.bar-track{flex:1;background:var(--bg);border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;}
.bar-amt{font-size:12px;font-weight:800;color:var(--sub);width:64px;text-align:right;flex-shrink:0;}
.tabs{display:flex;gap:8px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:var(--card);color:var(--sub);border:none;border-radius:50px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.tab.active{background:var(--text);color:#fff;}
.list{padding:6px 12px;display:flex;flex-direction:column;gap:9px;}
.empty{text-align:center;color:var(--sub);padding:48px 20px;font-size:14px;font-weight:600;line-height:1.7;}
.empty .emoji{font-size:36px;display:block;margin-bottom:8px;}
.card{background:var(--card);border-radius:14px;border:2.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:11px;}
.card.paid{opacity:.5;}
.card.s-gecikti{border-color:var(--red);}
.card.s-bugun{border-color:var(--orange);}
.card.s-yaklasiyor{border-color:var(--yellow);}
.card-emoji{font-size:24px;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card.paid .card-name{text-decoration:line-through;color:var(--sub);}
.card-meta{font-size:11px;color:var(--sub);margin-top:2px;font-weight:600;}
.card-note{font-size:11px;color:var(--sub);margin-top:3px;font-weight:600;font-style:italic;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.badge{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:800;white-space:nowrap;}
.b-gecikti{background:var(--red);color:#fff;}
.b-bugun{background:var(--orange);color:#fff;}
.b-yaklasiyor{background:var(--yellow);color:#fff;}
.b-gelecek{background:var(--border);color:var(--sub);}
.b-odendi{background:#e9f9ee;color:var(--green);}
.type-tag{font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;display:inline-block;margin-bottom:2px;}
.tg-d{background:#eaf2ff;color:var(--blue);}
.tg-t{background:#f5eeff;color:var(--purple);}
.card-actions{display:flex;gap:5px;}
.btn-paid,.btn-edit,.btn-del{border:none;border-radius:9px;padding:6px 11px;font-size:11px;font-weight:800;cursor:pointer;}
.btn-paid{background:#e9f9ee;color:var(--green);}
.card.paid .btn-paid{background:var(--border);color:var(--sub);}
.btn-edit{background:#e8f0ff;color:var(--blue);}
.btn-del{background:#fff0ef;color:var(--red);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:22px 18px 44px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:900;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;}
.type-toggle{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:14px;}
.type-btn{flex:1;border:none;background:transparent;border-radius:9px;padding:9px 0;font-size:13px;font-weight:800;cursor:pointer;color:var(--sub);}
.type-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.field{margin-bottom:11px;}
.field label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:12px 13px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.field-row{display:flex;gap:9px;}
.field-row .field{flex:1;}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:5px;}
.month-chip{border:2px solid var(--border);background:var(--bg);border-radius:9px;padding:9px 2px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub);text-align:center;}
.month-chip.sel{border-color:var(--blue);background:var(--blue);color:#fff;}
.month-chip.always-sel{border-color:var(--purple);background:var(--purple);color:#fff;}
.month-hint{font-size:11px;color:var(--sub);margin-bottom:5px;font-weight:600;}
.btn-save{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
.reset-btn{display:block;background:var(--card);color:var(--blue);border:1.5px solid var(--border);border-radius:13px;padding:13px;font-size:13px;font-weight:800;cursor:pointer;width:calc(100% - 24px);margin:10px 12px 0;text-align:center;}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#fff;border-radius:18px;padding:22px 20px;width:100%;max-width:320px;text-align:center;}
.confirm-msg{font-size:15px;font-weight:700;margin-bottom:18px;line-height:1.4;}
.confirm-actions{display:flex;gap:10px;}
.confirm-btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;}
.confirm-cancel{background:var(--bg);color:var(--text);}
.confirm-ok{background:var(--red);color:#fff;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1c1e;color:#fff;padding:12px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.rpt-btn{background:var(--card);color:var(--sub);border:1.5px solid var(--border);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.rpt-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.rpt-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
.rpt-table th{background:var(--bg);padding:8px 6px;text-align:left;font-weight:800;font-size:11px;color:var(--sub);text-transform:uppercase;}
.rpt-table td{padding:8px 6px;border-bottom:1px solid var(--border);font-weight:600;}
.rpt-table tr:last-child td{border-bottom:none;}
.rpt-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.rpt-card-title{font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="header-title">Ödemeler</div>
    <button type="button" id="btnOpenAdd" class="btn-add">+ Ekle</button>
  </div>
  <div class="month-nav">
    <button type="button" id="btnPrev" class="mnav-btn">&#8249;</button>
    <div class="mnav-center">
      <div class="mnav-month" id="mMonth"></div>
      <div class="mnav-year" id="mYear"></div>
      <div class="mnav-today" id="mToday"></div>
    </div>
    <button type="button" id="btnNext" class="mnav-btn">&#8250;</button>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="tabs">
  <button type="button" class="tab active" data-filter="all">Tümü</button>
  <button type="button" class="tab" data-filter="urgent">Acil</button>
  <button type="button" class="tab" data-filter="unpaid">Bekleyen</button>
  <button type="button" class="tab" data-filter="paid">Ödendi</button>
  <button type="button" class="tab" data-filter="report">📊 Rapor</button>
</div>

<div id="reportPanel" style="display:none;padding:10px 12px;"></div>

<div class="list" id="list"></div>
<button type="button" id="resetBtn" class="reset-btn" style="display:none">Bu Ayı Sıfırla</button>

<div class="overlay" id="addOv">
  <div class="modal">
    <div class="modal-title">Yeni Ödeme <button type="button" id="btnCloseAdd" class="modal-close">X</button></div>
    <div class="type-toggle">
      <button type="button" id="addBtnD" class="type-btn active">Düzenli</button>
      <button type="button" id="addBtnT" class="type-btn">Tek Seferlik</button>
    </div>
    <div class="field">
      <label>Ödeme Adı</label>
      <input type="text" id="addName" placeholder="Ornek: Kira, Kredi Karti...">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Tutar (TL)</label>
        <input type="number" id="addAmt" placeholder="İsteğe Bağlı" inputmode="decimal">
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="addCat">
          <option value="kira">🏠 Kira</option>
          <option value="aidat">🏢 Aidat</option>
          <option value="okul">🎓 Okul</option>
          <option value="kredi">💳 Kredi Kartı</option>
          <option value="fatura">📄 Fatura</option>
          <option value="abonelik">📱 Abonelik</option>
          <option value="diger">📌 Diğer</option>
        </select>
      </div>
    </div>
    <div id="addDuzenli">
      <div class="field">
        <label>Her Ayın Kaçında?</label>
        <input type="number" id="addDay" min="1" max="31" placeholder="1-31" inputmode="numeric">
      </div>
      <div class="field">
        <label>Hangi Aylar?</label>
        <div class="month-hint">Sürekli = her ay | Diğer kutular = sadece o aylar</div>
        <div class="month-grid" id="addGrid"></div>
      </div>
    </div>
    <div id="addTek" style="display:none">
      <div class="field">
        <label>Ödeme Tarihi</label>
        <input type="date" id="addDate">
      </div>
    </div>
    <div class="field">
      <label>Not (İsteğe Bağlı)</label>
      <input type="text" id="addNote" placeholder="Örn: Ekstre belli olunca güncelle">
    </div>
    <button type="button" id="btnSaveAdd" class="btn-save">Kaydet</button>
  </div>
</div>

<div class="overlay" id="editOv">
  <div class="modal">
    <div class="modal-title">Duzenle <button type="button" id="btnCloseEdit" class="modal-close">X</button></div>
    <input type="hidden" id="editId">
    <div class="type-toggle">
      <button type="button" id="editBtnD" class="type-btn active">Düzenli</button>
      <button type="button" id="editBtnT" class="type-btn">Tek Seferlik</button>
    </div>
    <div class="field">
      <label>Ödeme Adı</label>
      <input type="text" id="editName">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Tutar (TL)</label>
        <input type="number" id="editAmt" inputmode="decimal">
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="editCat">
          <option value="kira">🏠 Kira</option>
          <option value="aidat">🏢 Aidat</option>
          <option value="okul">🎓 Okul</option>
          <option value="kredi">💳 Kredi Kartı</option>
          <option value="fatura">📄 Fatura</option>
          <option value="abonelik">📱 Abonelik</option>
          <option value="diger">📌 Diğer</option>
        </select>
      </div>
    </div>
    <div id="editDuzenli">
      <div class="field">
        <label>Her Ayın Kaçında?</label>
        <input type="number" id="editDay" min="1" max="31" inputmode="numeric">
      </div>
      <div class="field">
        <label>Hangi Aylar?</label>
        <div class="month-hint">Sürekli = her ay | Diğer kutular = sadece o aylar</div>
        <div class="month-grid" id="editGrid"></div>
      </div>
    </div>
    <div id="editTek" style="display:none">
      <div class="field">
        <label>Ödeme Tarihi</label>
        <input type="date" id="editDate">
      </div>
    </div>
    <div class="field">
      <label>Not (İsteğe Bağlı)</label>
      <input type="text" id="editNote">
    </div>
    <button type="button" id="btnSaveEdit" class="btn-save">Güncelle</button>
  </div>
</div>

<div class="confirm-overlay" id="confirmOv">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button type="button" id="confirmNo" class="confirm-btn confirm-cancel">Vazgeç</button>
      <button type="button" id="confirmYes" class="confirm-btn confirm-ok">Sil</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var EMJ = {kira:'🏠',aidat:'🏢',okul:'🎓',kredi:'💳',fatura:'📄',abonelik:'📱',diger:'📌'};
var CNMS = {kira:'Kira',aidat:'Aidat',okul:'Okul',kredi:'Kredi Kartı',fatura:'Fatura',abonelik:'Abonelik',diger:'Diğer'};
var CCLR = {kira:'#007aff',aidat:'#34c759',okul:'#ff9500',kredi:'#ff3b30',fatura:'#af52de',abonelik:'#5ac8fa',diger:'#8e8e93'};
var MO = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
var MOFULL = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
var KEY = 'odeme-v8';

var payments = [];
var filt = 'all';
var addType = 'd';
var editType = 'd';
var addSel = new Set();
var editSel = new Set();
var viewYear = new Date().getFullYear();
var viewMonth = new Date().getMonth();
var confirmCB = null;
var toastTimer = null;

function load() {
  try { payments = JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e) { payments = []; }
  if (!Array.isArray(payments)) payments = [];
}

function persist() {
  try { localStorage.setItem(KEY, JSON.stringify(payments)); }
  catch(e) { toast('Kaydetme hatası'); }
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function pkey(yr, mo) { return yr + '-' + mo; }

function isPaid(p, yr, mo) {
  return !!(p.paidMonths && p.paidMonths[pkey(yr, mo)]);
}

function setPaid(p, yr, mo, val) {
  if (!p.paidMonths) p.paidMonths = {};
  if (val) p.paidMonths[pkey(yr, mo)] = true;
  else delete p.paidMonths[pkey(yr, mo)];
}

function getStatus(p, yr, mo) {
  if (p.type === 't') {
    var d = new Date(p.date + 'T00:00:00');
    if (d.getFullYear() !== yr || d.getMonth() !== mo) return null;
    if (isPaid(p, yr, mo)) return 'odendi';
    var now = new Date(); now.setHours(0,0,0,0);
    var due = new Date(yr, mo, d.getDate()); due.setHours(0,0,0,0);
    var df = Math.round((due - now) / 86400000);
    if (df < 0) return 'gecikti';
    if (df === 0) return 'bugun';
    if (df <= 3) return 'yaklasiyor';
    return 'gelecek';
  }
  var inMo = p.months === 'always' ? true : (Array.isArray(p.months) && p.months.indexOf(mo) >= 0);
  if (!inMo) return null;
  if (isPaid(p, yr, mo)) return 'odendi';
  var now2 = new Date(); now2.setHours(0,0,0,0);
  var due2 = new Date(yr, mo, p.dueDay); due2.setHours(0,0,0,0);
  var df2 = Math.round((due2 - now2) / 86400000);
  if (df2 < 0) return 'gecikti';
  if (df2 === 0) return 'bugun';
  if (df2 <= 3) return 'yaklasiyor';
  return 'gelecek';
}

function metaTxt(p) {
  if (p.type === 't') {
    var d = new Date(p.date + 'T00:00:00');
    return d.getDate() + ' ' + MO[d.getMonth()] + ' ' + d.getFullYear();
  }
  var ml = p.months === 'always' ? 'Sürekli' : p.months.map(function(m) { return MO[m]; }).join(', ');
  return 'Her ayın ' + p.dueDay + '. günü - ' + ml;
}

function blabel(s) {
  var map = {gecikti:'Gecikti!',bugun:'Bugün!',yaklasiyor:'Yaklasıyor',gelecek:'Zamanında',odendi:'Ödendi'};
  return map[s] || '';
}

function esc(t) {
  return String(t == null ? '' : t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmt(n) {
  var num = Number(n);
  if (isNaN(num)) return '0';
  return num.toLocaleString('tr-TR');
}

function monthPayments() {
  return payments.filter(function(p) {
    return getStatus(p, viewYear, viewMonth) !== null;
  });
}

function renderSummary() {
  var mp = monthPayments();
  var total = 0, paid = 0;
  var cats = {};
  mp.forEach(function(p) {
    var a = parseFloat(p.amount) || 0;
    total += a;
    if (isPaid(p, viewYear, viewMonth)) paid += a;
    var c = p.category || 'diger';
    cats[c] = (cats[c] || 0) + a;
  });
  var unpaid = total - paid;
  var el = document.getElementById('summary');
  if (mp.length === 0) {
    el.innerHTML = '<div class="sum-label">' + MOFULL[viewMonth] + ' ' + viewYear + '</div><div style="font-size:13px;color:var(--sub);font-weight:600;">Bu ay odeme yok</div>';
    return;
  }
  var html = '<div class="sum-label">' + MOFULL[viewMonth] + ' ' + viewYear + ' - ' + mp.length + ' odeme</div>';
  if (total > 0) {
    html += '<div class="sum-total">' + fmt(total) + ' TL</div>';
    html += '<div class="sum-row">';
    html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--green)">' + fmt(paid) + ' TL</div><div class="sum-chip-lbl">Ödendi</div></div>';
    html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--red)">' + fmt(unpaid) + ' TL</div><div class="sum-chip-lbl">Bekliyor</div></div>';
    html += '</div>';
    var catArr = Object.keys(cats).filter(function(c) { return cats[c] > 0; }).sort(function(a,b) { return cats[b] - cats[a]; });
    if (catArr.length > 0) {
      html += '<div class="bar-section"><div class="bar-title">Kategori Dagilimi</div>';
      catArr.forEach(function(c) {
        var pct = Math.round((cats[c] / total) * 100);
        html += '<div class="bar-item">';
        html += '<span class="bar-emoji">' + (EMJ[c] || '📌') + '</span>';
        html += '<span class="bar-label">' + esc(CNMS[c] || c) + '</span>';
        html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (CCLR[c] || '#888') + '"></div></div>';
        html += '<span class="bar-amt">' + fmt(cats[c]) + ' TL</span>';
        html += '</div>';
      });
      html += '</div>';
    }
  } else {
    html += '<div style="font-size:13px;color:var(--sub);font-weight:600;">' + mp.length + ' odeme - tutar girilmemis</div>';
  }
  el.innerHTML = html;
}

function renderList() {
  var mp = monthPayments();
  var order = {gecikti:0,bugun:1,yaklasiyor:2,gelecek:3,odendi:4};
  var list = mp.slice().sort(function(a,b) {
    var sa = order[getStatus(a, viewYear, viewMonth)];
    var sb = order[getStatus(b, viewYear, viewMonth)];
    return (sa === undefined ? 3 : sa) - (sb === undefined ? 3 : sb);
  });
  if (filt === 'urgent') list = list.filter(function(p) { var s = getStatus(p,viewYear,viewMonth); return s==='gecikti'||s==='bugun'||s==='yaklasiyor'; });
  else if (filt === 'unpaid') list = list.filter(function(p) { return getStatus(p,viewYear,viewMonth) !== 'odendi'; });
  else if (filt === 'paid') list = list.filter(function(p) { return getStatus(p,viewYear,viewMonth) === 'odendi'; });
  var el = document.getElementById('list');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty"><span class="emoji">' + (payments.length===0?'📋':'🔍') + '</span>' + (payments.length===0?'Ödeme yok.<br>"+ Ekle" ile başlayın.':MOFULL[viewMonth]+' ayında bu filtrede ödeme yok.') + '</div>';
    return;
  }
  var html = '';
  list.forEach(function(p) {
    var s = getStatus(p, viewYear, viewMonth);
    var paid = isPaid(p, viewYear, viewMonth);
    var amtTxt = p.amount ? ' · <strong>' + fmt(p.amount) + ' TL</strong>' : '';
    var ttag = p.type === 'd' ? '<span class="type-tag tg-d">Düzenli</span>' : '<span class="type-tag tg-t">Tek Seferlik</span>';
    var noteHtml = p.note ? '<div class="card-note">Not: ' + esc(p.note) + '</div>' : '';
    html += '<div class="card ' + (paid ? 'paid' : '') + ' ' + (paid ? '' : 's-' + s) + '" data-id="' + esc(p.id) + '">';
    html += '<span class="card-emoji">' + (EMJ[p.category] || '📌') + '</span>';
    html += '<div class="card-info">' + ttag + '<div class="card-name">' + esc(p.name) + '</div>';
    html += '<div class="card-meta">' + metaTxt(p) + amtTxt + '</div>' + noteHtml + '</div>';
    html += '<div class="card-right"><span class="badge b-' + s + '">' + blabel(s) + '</span>';
    html += '<div class="card-actions">';
    html += '<button type="button" class="btn-paid" data-action="paid" data-id="' + esc(p.id) + '">' + (paid ? 'Geri Al' : 'Ödendi') + '</button>';
    html += '<button type="button" class="btn-edit" data-action="edit" data-id="' + esc(p.id) + '">Düzenle</button>';
    html += '<button type="button" class="btn-del" data-action="del" data-id="' + esc(p.id) + '">Sil</button>';
    html += '</div></div></div>';
  });
  el.innerHTML = html;
}

function render() {
  var isNow = viewYear === new Date().getFullYear() && viewMonth === new Date().getMonth();
  document.getElementById('mMonth').textContent = MOFULL[viewMonth];
  document.getElementById('mYear').textContent = viewYear;
  document.getElementById('mToday').textContent = isNow ? '' : 'Bugüne dön';
  renderSummary();
  renderList();
  var mp = monthPayments();
  var hasPaid = mp.some(function(p) { return isPaid(p, viewYear, viewMonth); });
  document.getElementById('resetBtn').style.display = hasPaid ? 'block' : 'none';
}

function buildGrid(gridId, selSet) {
  var g = document.getElementById(gridId);
  g.innerHTML = '';
  var ac = document.createElement('button');
  ac.type = 'button';
  ac.className = 'month-chip' + (selSet.has('always') ? ' always-sel' : '');
  ac.textContent = 'Sürekli';
  ac.setAttribute('data-val', 'always');
  g.appendChild(ac);
  MO.forEach(function(m, i) {
    var chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'month-chip' + ((selSet.has(i) && !selSet.has('always')) ? ' sel' : '');
    chip.textContent = m;
    chip.setAttribute('data-val', String(i));
    g.appendChild(chip);
  });
}

function handleGrid(e, selSet, gridId) {
  var btn = e.target.closest('.month-chip');
  if (!btn) return;
  var val = btn.getAttribute('data-val');
  if (val === 'always') {
    if (selSet.has('always')) selSet.clear();
    else { selSet.clear(); selSet.add('always'); }
  } else {
    var idx = parseInt(val, 10);
    if (selSet.has('always')) selSet.clear();
    if (selSet.has(idx)) selSet.delete(idx);
    else selSet.add(idx);
  }
  buildGrid(gridId, selSet);
}

function openAdd() {
  addSel = new Set([viewMonth]);
  addType = 'd';
  document.getElementById('addBtnD').classList.add('active');
  document.getElementById('addBtnT').classList.remove('active');
  document.getElementById('addDuzenli').style.display = '';
  document.getElementById('addTek').style.display = 'none';

  document.getElementById('addDay').value = '';
  document.getElementById('addAmt').value = '';
  document.getElementById('addNote').value = '';
  document.getElementById('addDate').value = new Date().toISOString().split('T')[0];
  buildGrid('addGrid', addSel);

}

function closeAdd() { document.getElementById('addOv').classList.remove('open'); }

function saveAdd() {
  var nm = document.getElementById('addName').value.trim();
  if (!nm) { toast('Lütfen ödeme adı girin'); return; }
  var p = {
    id: 'p' + Date.now() + Math.random().toString(36).slice(2,6),
    name: nm,
    amount: document.getElementById('addAmt').value.trim(),
    category: document.getElementById('addCat').value,
    note: document.getElementById('addNote').value.trim(),
    type: addType,
    paidMonths: {}
  };
  if (addType === 'd') {
    var day = parseInt(document.getElementById('addDay').value, 10);
    if (isNaN(day) || day < 1 || day > 31) { toast('Geçerli bir gün girin (1-31)'); return; }
    if (addSel.size === 0) { toast('En az bir ay seçin veya Sürekli işaretleyin'); return; }
    p.dueDay = day;
    p.months = addSel.has('always') ? 'always' : Array.from(addSel).sort(function(a,b) { return a-b; });
  } else {
    var dt = document.getElementById('addDate').value;
    if (!dt) { toast('Lütfen tarih seçin'); return; }
    p.date = dt;
  }
  payments.push(p);
  persist();
  render();
  closeAdd();
  toast('Ödeme eklendi');
}

function openEdit(id) {
  var p = payments.find(function(x) { return x.id === id; });
  if (!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('editName').value = p.name;
  document.getElementById('editAmt').value = p.amount || '';
  document.getElementById('editCat').value = p.category;
  document.getElementById('editNote').value = p.note || '';
  editType = p.type;
  document.getElementById('editBtnD').classList.toggle('active', editType === 'd');
  document.getElementById('editBtnT').classList.toggle('active', editType === 't');
  document.getElementById('editDuzenli').style.display = editType === 'd' ? '' : 'none';
  document.getElementById('editTek').style.display = editType === 't' ? '' : 'none';
  if (p.type === 'd') {
    document.getElementById('editDay').value = p.dueDay;
    editSel = p.months === 'always' ? new Set(['always']) : new Set(p.months);
  } else {
    document.getElementById('editDate').value = p.date;
    editSel = new Set();
  }
  buildGrid('editGrid', editSel);
  document.getElementById('editOv').classList.add('open');
}

function closeEdit() { document.getElementById('editOv').classList.remove('open'); }

function saveEdit() {
  var id = document.getElementById('editId').value;
  var nm = document.getElementById('editName').value.trim();
  if (!nm) { toast('Lütfen ödeme adı girin'); return; }
  var idx = payments.findIndex(function(x) { return x.id === id; });
  if (idx === -1) return;
  var orig = payments[idx];
  var u = {
    id: orig.id,
    name: nm,
    amount: document.getElementById('editAmt').value.trim(),
    category: document.getElementById('editCat').value,
    note: document.getElementById('editNote').value.trim(),
    type: editType,
    paidMonths: Object.assign({}, orig.paidMonths || {})
  };
  if (editType === 'd') {
    var day = parseInt(document.getElementById('editDay').value, 10);
    if (isNaN(day) || day < 1 || day > 31) { toast('Geçerli bir gün girin'); return; }
    if (editSel.size === 0) { toast('En az bir ay seçin'); return; }
    u.dueDay = day;
    u.months = editSel.has('always') ? 'always' : Array.from(editSel).sort(function(a,b) { return a-b; });
  } else {
    var dt = document.getElementById('editDate').value;
    if (!dt) { toast('Lütfen tarih seçin'); return; }
    u.date = dt;
  }
  payments[idx] = u;
  persist();
  render();
  closeEdit();
  toast('Ödeme güncellendi');
}

function togPaid(id) {
  var idx = payments.findIndex(function(p) { return p.id === id; });
  if (idx === -1) return;
  var p = payments[idx];
  var u = Object.assign({}, p, {paidMonths: Object.assign({}, p.paidMonths || {})});
  setPaid(u, viewYear, viewMonth, !isPaid(u, viewYear, viewMonth));
  payments[idx] = u;
  persist();
  render();
}

function delPayment(id) {
  var before = payments.length;
  payments = payments.filter(function(p) { return p.id !== id; });
  if (payments.length < before) {
    persist();
    render();
    toast('Ödeme silindi');
  }
}

// ───────── RAPOR ─────────
var rptMode = 'custom';
var rptStart = '';
var rptEnd = '';

function initRptDates() {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  // default: first day of this month to today
  rptStart = y + '-' + String(m+1).padStart(2,'0') + '-01';
  rptEnd = now.toISOString().split('T')[0];
}

function renderReport() {
  if (!rptStart) initRptDates();
  var panel = document.getElementById('reportPanel');

  // Quick-select buttons
  var qs = [
    {key:'month', label:'Bu Ay'},
    {key:'lastmonth', label:'Geçen Ay'},
    {key:'year', label:'Bu Yıl'},
    {key:'all', label:'Tüm Zamanlar'},
    {key:'custom', label:'Tarih Seç'},
  ];
  var btnHtml = '<div class="rpt-card"><div class="rpt-card-title">Dönem</div>'
    + '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">';
  qs.forEach(function(q) {
    btnHtml += '<button type="button" class="rpt-btn' + (rptMode===q.key?' active':'') + '" data-rpt="' + q.key + '">' + q.label + '</button>';
  });
  btnHtml += '</div>';

  // Date range pickers
  btnHtml += '<div style="display:flex;gap:8px;align-items:center;">'
    + '<div style="flex:1"><div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;">BAŞLANGIÇ</div>'
    + '<input type="date" id="rptStart" value="' + rptStart + '" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:14px;font-family:\'Nunito\',sans-serif;font-weight:600;color:var(--text);outline:none;-webkit-appearance:none;"></div>'
    + '<div style="flex:1"><div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;">BİTİŞ</div>'
    + '<input type="date" id="rptEnd" value="' + rptEnd + '" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:14px;font-family:\'Nunito\',sans-serif;font-weight:600;color:var(--text);outline:none;-webkit-appearance:none;"></div>'
    + '</div>'
    + '<button type="button" id="btnRptApply" style="width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;margin-top:10px;">Raporu Oluştur</button>'
    + '</div>';

  var rptData = getRptData();
  var contentHtml = buildRptHtml(rptData);

  panel.innerHTML = btnHtml + contentHtml
    + '<button type="button" id="btnExcel" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:10px;">📥 Excel İndir</button>';

  // Wire quick-select buttons
  panel.querySelectorAll('.rpt-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      rptMode = b.getAttribute('data-rpt');
      var now = new Date();
      var y = now.getFullYear(), m = now.getMonth();
      if (rptMode === 'month') {
        rptStart = y + '-' + String(m+1).padStart(2,'0') + '-01';
        rptEnd = now.toISOString().split('T')[0];
      } else if (rptMode === 'lastmonth') {
        var lm = m === 0 ? 11 : m-1;
        var ly = m === 0 ? y-1 : y;
        var lastDay = new Date(ly, lm+1, 0).getDate();
        rptStart = ly + '-' + String(lm+1).padStart(2,'0') + '-01';
        rptEnd = ly + '-' + String(lm+1).padStart(2,'0') + '-' + String(lastDay).padStart(2,'0');
      } else if (rptMode === 'year') {
        rptStart = y + '-01-01';
        rptEnd = now.toISOString().split('T')[0];
      } else if (rptMode === 'all') {
        rptStart = '2020-01-01';
        rptEnd = now.toISOString().split('T')[0];
      }
      // 'custom' keeps existing dates
      renderReport();
    });
  });

  // Wire date inputs
  var startInp = document.getElementById('rptStart');
  var endInp = document.getElementById('rptEnd');
  if (startInp) startInp.addEventListener('change', function() { rptStart = this.value; rptMode = 'custom'; });
  if (endInp) endInp.addEventListener('change', function() { rptEnd = this.value; rptMode = 'custom'; });

  var applyBtn = document.getElementById('btnRptApply');
  if (applyBtn) applyBtn.addEventListener('click', function() {
    var s = document.getElementById('rptStart').value;
    var e = document.getElementById('rptEnd').value;
    if (!s || !e) { toast('Lütfen başlangıç ve bitiş tarihi seçin'); return; }
    if (s > e) { toast('Başlangıç tarihi bitiş tarihinden büyük olamaz'); return; }
    rptStart = s; rptEnd = e;
    renderReport();
  });

  var excelBtn = document.getElementById('btnExcel');
  if (excelBtn) excelBtn.addEventListener('click', downloadExcel);
}

function getRptData() {
  if (!rptStart || !rptEnd) initRptDates();
  var start = new Date(rptStart + 'T00:00:00');
  var end = new Date(rptEnd + 'T23:59:59');
  var rows = [];

  payments.forEach(function(p) {
    if (p.type === 't') {
      var d = new Date(p.date + 'T00:00:00');
      if (d >= start && d <= end) {
        rows.push({
          name: p.name,
          category: CNMS[p.category] || p.category,
          catKey: p.category,
          date: p.date,
          amount: parseFloat(p.amount) || 0,
          paid: isPaid(p, d.getFullYear(), d.getMonth())
        });
      }
    } else {
      // For recurring: iterate months in range
      var cur = new Date(start.getFullYear(), start.getMonth(), 1);
      var endMo = new Date(end.getFullYear(), end.getMonth(), 1);
      while (cur <= endMo) {
        var yr = cur.getFullYear(), mo = cur.getMonth();
        var inMonths = p.months === 'always' ? true : (Array.isArray(p.months) && p.months.indexOf(mo) >= 0);
        if (inMonths) {
          var dueDate = new Date(yr, mo, p.dueDay);
          if (dueDate >= start && dueDate <= end) {
            var dateStr = yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(p.dueDay).padStart(2,'0');
            rows.push({
              name: p.name,
              category: CNMS[p.category] || p.category,
              catKey: p.category,
              date: dateStr,
              amount: parseFloat(p.amount) || 0,
              paid: isPaid(p, yr, mo)
            });
          }
        }
        // next month
        cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
      }
    }
  });

  rows.sort(function(a,b) { return a.date < b.date ? -1 : 1; });
  return rows;
}

function buildRptHtml(rows) {
  var ds = rptStart.split('-'), de = rptEnd.split('-');
  var rangeLabel = (ds.length===3 ? ds[2]+'.'+ds[1]+'.'+ds[0] : rptStart)
    + ' – ' + (de.length===3 ? de[2]+'.'+de[1]+'.'+de[0] : rptEnd);

  if (rows.length === 0) {
    return '<div class="rpt-card"><div style="text-align:center;color:var(--sub);padding:20px;font-weight:600;">'
      + rangeLabel + ' arasında ödeme bulunamadı</div></div>';
  }

  var total = 0, paid = 0;
  rows.forEach(function(r) { total += r.amount; if (r.paid) paid += r.amount; });

  var cats = {};
  rows.forEach(function(r) {
    var c = r.category;
    if (!cats[c]) cats[c] = {total:0, count:0, paidAmt:0, paidCnt:0};
    cats[c].total += r.amount;
    cats[c].count++;
    if (r.paid) { cats[c].paidAmt += r.amount; cats[c].paidCnt++; }
  });
  var catArr = Object.keys(cats).sort(function(a,b) { return cats[b].total - cats[a].total; });

  var html = '';

  // Summary
  html += '<div class="rpt-card">';
  html += '<div class="rpt-card-title">' + rangeLabel + ' Özeti</div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  html += '<div class="sum-chip"><div class="sum-chip-val">' + fmt(total) + ' TL</div><div class="sum-chip-lbl">Toplam</div></div>';
  html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--green)">' + fmt(paid) + ' TL</div><div class="sum-chip-lbl">Ödendi</div></div>';
  html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--red)">' + fmt(total-paid) + ' TL</div><div class="sum-chip-lbl">Bekliyor</div></div>';
  html += '<div class="sum-chip"><div class="sum-chip-val">' + rows.length + '</div><div class="sum-chip-lbl">Ödeme</div></div>';
  html += '</div></div>';

  // Category table
  if (catArr.length > 0 && total > 0) {
    html += '<div class="rpt-card"><div class="rpt-card-title">Kategori Dağılımı</div>';
    // Bar chart
    catArr.forEach(function(c) {
      var cd = cats[c];
      var pct = total > 0 ? Math.round(cd.total/total*100) : 0;
      var color = CCLR[Object.keys(CNMS).find(function(k){ return CNMS[k]===c; })] || '#8e8e93';
      html += '<div style="margin-bottom:10px;">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
      html += '<span style="font-size:13px;font-weight:700;">' + esc(c) + ' <span style="font-size:11px;color:var(--sub)">(' + cd.count + ' ödeme)</span></span>';
      html += '<span style="font-size:13px;font-weight:800;color:' + color + '">' + fmt(cd.total) + ' TL</span>';
      html += '</div>';
      html += '<div style="background:var(--bg);border-radius:6px;height:10px;overflow:hidden;">';
      html += '<div style="width:' + pct + '%;height:100%;border-radius:6px;background:' + color + '"></div></div>';
      html += '<div style="font-size:11px;color:var(--sub);margin-top:3px;">Ödendi: ' + fmt(cd.paidAmt) + ' TL · Bekliyor: ' + fmt(cd.total-cd.paidAmt) + ' TL</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Detail table
  html += '<div class="rpt-card"><div class="rpt-card-title">Ödeme Detayları (' + rows.length + ')</div>';
  html += '<table class="rpt-table"><thead><tr><th>Tarih</th><th>Ödeme</th><th>Tutar</th><th>Durum</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var ds2 = r.date ? r.date.split('-') : [];
    var dateStr = ds2.length===3 ? ds2[2]+'.'+ds2[1]+'.'+ds2[0] : r.date;
    html += '<tr>';
    html += '<td style="white-space:nowrap;font-size:12px">' + dateStr + '</td>';
    html += '<td>' + esc(r.name) + '<br><span style="font-size:10px;color:var(--sub)">' + esc(r.category) + '</span></td>';
    html += '<td style="white-space:nowrap">' + (r.amount > 0 ? fmt(r.amount)+' TL' : '-') + '</td>';
    html += '<td><span style="font-size:11px;font-weight:800;padding:2px 7px;border-radius:20px;background:' + (r.paid?'#e9f9ee':'#fff0ef') + ';color:' + (r.paid?'var(--green)':'var(--red)') + '">' + (r.paid?'Ödendi':'Bekliyor') + '</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  return html;
}

function downloadExcel() {
  var rows = getRptData();
  var ds = rptStart.split('-'), de = rptEnd.split('-');
  var label = (ds.length===3 ? ds[2]+'.'+ds[1]+'.'+ds[0] : rptStart)
    + '_' + (de.length===3 ? de[2]+'.'+de[1]+'.'+de[0] : rptEnd);

  var total = rows.reduce(function(s,r){return s+r.amount;},0);
  var paid = rows.filter(function(r){return r.paid;}).reduce(function(s,r){return s+r.amount;},0);

  var BOM = '\uFEFF';
  var lines = [
    'Ödeme Raporu: ' + label.replace(/_/g,' – '),
    '',
    'Tarih\tÖdeme Adı\tKategori\tTutar (TL)\tDurum'
  ];

  rows.forEach(function(r) {
    var ds2 = r.date ? r.date.split('-') : [];
    var dateStr = ds2.length===3 ? ds2[2]+'.'+ds2[1]+'.'+ds2[0] : (r.date||'');
    lines.push([
      dateStr,
      r.name,
      r.category,
      r.amount > 0 ? r.amount.toFixed(2).replace('.',',') : '',
      r.paid ? 'Ödendi' : 'Bekliyor'
    ].join('\t'));
  });

  lines.push('');
  lines.push('\t\tTOPLAM\t' + total.toFixed(2).replace('.',','));
  lines.push('\t\tÖDENDİ\t' + paid.toFixed(2).replace('.',','));
  lines.push('\t\tBEKLİYOR\t' + (total-paid).toFixed(2).replace('.',','));

  var blob = new Blob([BOM + lines.join('\n')], {type:'text/tab-separated-values;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Odeme-Raporu-' + label + '.xls';
  a.click();
  URL.revokeObjectURL(url);
  toast('Excel indirildi');
}


function renderReport() {
  var panel = document.getElementById('reportPanel');
  var btnHtml = '<div class="rpt-card"><div class="rpt-card-title">Rapor Türü</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;">'
    + '<button type="button" class="rpt-btn' + (rptMode==='month'?' active':'') + '" data-rpt="month">Bu Ay</button>'
    + '<button type="button" class="rpt-btn' + (rptMode==='year'?' active':'') + '" data-rpt="year">Bu Yıl</button>'
    + '<button type="button" class="rpt-btn' + (rptMode==='all'?' active':'') + '" data-rpt="all">Tüm Zamanlar</button>'
    + '</div></div>';

}

function getRptData() {
  var now = new Date();
  var thisYear = now.getFullYear();
  var thisMonth = now.getMonth();

  // Collect rows: {name, category, date, amount, paid}
  var rows = [];
  payments.forEach(function(p) {
    if (p.type === 't') {
      var d = new Date(p.date + 'T00:00:00');
      var yr = d.getFullYear(), mo = d.getMonth();
      var include = rptMode==='month' ? (yr===thisYear && mo===thisMonth)
                  : rptMode==='year'  ? yr===thisYear
                  : true;
      if (include) {
        rows.push({
          name: p.name,
          category: CNMS[p.category] || p.category,
          date: p.date,
          amount: parseFloat(p.amount) || 0,
          paid: isPaid(p, yr, mo)
        });
      }
    } else {
      var months = p.months === 'always'
        ? Array.from({length:12}, function(_,i){return i;})
        : (Array.isArray(p.months) ? p.months : []);
      months.forEach(function(mo) {
        var yr = thisYear;
        var include = rptMode==='month' ? (mo===thisMonth)
                    : rptMode==='year'  ? true
                    : true;
        if (rptMode==='all') {
          // For "always" payments show last 12 months
          for (var m=0; m<12; m++) {
            var checkMo = (thisMonth - m + 12) % 12;
            var checkYr = thisMonth - m < 0 ? thisYear-1 : thisYear;
            if (p.months === 'always' || p.months.indexOf(checkMo) >= 0) {
              rows.push({
                name: p.name,
                category: CNMS[p.category] || p.category,
                date: checkYr + '-' + String(checkMo+1).padStart(2,'0') + '-' + String(p.dueDay).padStart(2,'0'),
                amount: parseFloat(p.amount) || 0,
                paid: isPaid(p, checkYr, checkMo)
              });
            }
          }
          return;
        }
        if (include) {
          rows.push({
            name: p.name,
            category: CNMS[p.category] || p.category,
            date: yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(p.dueDay).padStart(2,'0'),
            amount: parseFloat(p.amount) || 0,
            paid: isPaid(p, yr, mo)
          });
        }
      });
    }
  });

  // Deduplicate for "all" mode
  if (rptMode === 'all') {
    var seen = {};
    rows = rows.filter(function(r) {
      var k = r.name + r.date;
      if (seen[k]) return false;
      seen[k] = true;
      return true;
    });
  }

  rows.sort(function(a,b) { return a.date < b.date ? -1 : 1; });
  return rows;
}

function buildRptHtml(rows) {
  if (rows.length === 0) {
    return '<div class="rpt-card"><div style="text-align:center;color:var(--sub);padding:20px;font-weight:600;">Bu dönemde ödeme yok</div></div>';
  }

  var total = 0, paid = 0;
  rows.forEach(function(r) { total += r.amount; if (r.paid) paid += r.amount; });

  // Category summary
  var cats = {};
  rows.forEach(function(r) {
    if (!cats[r.category]) cats[r.category] = {total:0, count:0, paid:0};
    cats[r.category].total += r.amount;
    cats[r.category].count++;
    if (r.paid) cats[r.category].paid += r.amount;
  });
  var catArr = Object.keys(cats).sort(function(a,b) { return cats[b].total - cats[a].total; });

  var html = '';

  // Summary card
  html += '<div class="rpt-card">';
  html += '<div class="rpt-card-title">Özet</div>';
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
  html += '<div class="sum-chip"><div class="sum-chip-val">' + fmt(total) + ' TL</div><div class="sum-chip-lbl">Toplam</div></div>';
  html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--green)">' + fmt(paid) + ' TL</div><div class="sum-chip-lbl">Ödendi</div></div>';
  html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--red)">' + fmt(total-paid) + ' TL</div><div class="sum-chip-lbl">Bekliyor</div></div>';
  html += '<div class="sum-chip"><div class="sum-chip-val">' + rows.length + '</div><div class="sum-chip-lbl">Ödeme</div></div>';
  html += '</div></div>';

  // Category breakdown
  if (catArr.length > 0 && total > 0) {
    html += '<div class="rpt-card"><div class="rpt-card-title">Kategori Dağılımı</div>';
    html += '<table class="rpt-table"><thead><tr><th>Kategori</th><th>Tutar</th><th>Ödendi</th><th>Adet</th></tr></thead><tbody>';
    catArr.forEach(function(c) {
      var cd = cats[c];
      html += '<tr><td>' + esc(c) + '</td><td>' + fmt(cd.total) + ' TL</td><td>' + fmt(cd.paid) + ' TL</td><td>' + cd.count + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Detail list
  html += '<div class="rpt-card"><div class="rpt-card-title">Ödeme Detayları (' + rows.length + ')</div>';
  html += '<table class="rpt-table"><thead><tr><th>Tarih</th><th>Ödeme</th><th>Tutar</th><th>Durum</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var ds = r.date ? r.date.split('-') : [];
    var dateStr = ds.length===3 ? ds[2]+'.'+ds[1]+'.'+ds[0] : r.date;
    html += '<tr>';
    html += '<td style="white-space:nowrap">' + dateStr + '</td>';
    html += '<td>' + esc(r.name) + '<br><span style="font-size:10px;color:var(--sub)">' + esc(r.category) + '</span></td>';
    html += '<td style="white-space:nowrap">' + (r.amount > 0 ? fmt(r.amount)+' TL' : '-') + '</td>';
    html += '<td><span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;background:' + (r.paid?'#e9f9ee':'#fff0ef') + ';color:' + (r.paid?'var(--green)':'var(--red)') + '">' + (r.paid?'Ödendi':'Bekliyor') + '</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  return html;
}

function downloadExcel() {
  var rows = getRptData();
  var modeLabel = rptMode==='month' ? (MOFULL[new Date().getMonth()]+' '+new Date().getFullYear())
                : rptMode==='year' ? new Date().getFullYear()+' Yılı'
                : 'Tüm Zamanlar';

  // Build CSV with BOM for Turkish chars in Excel
  var BOM = '\uFEFF';
  var lines = ['Tarih\tÖdeme Adı\tKategori\tTutar (TL)\tDurum'];
  rows.forEach(function(r) {
    var ds = r.date ? r.date.split('-') : [];
    var dateStr = ds.length===3 ? ds[2]+'.'+ds[1]+'.'+ds[0] : (r.date||'');
    lines.push([
      dateStr,
      r.name,
      r.category,
      r.amount > 0 ? r.amount.toFixed(2).replace('.', ',') : '',
      r.paid ? 'Ödendi' : 'Bekliyor'
    ].join('\t'));
  });

  // Summary rows
  var total = rows.reduce(function(s,r) { return s+r.amount; }, 0);
  var paid = rows.filter(function(r) { return r.paid; }).reduce(function(s,r) { return s+r.amount; }, 0);
  lines.push('');
  lines.push('\t\tTOPLAM\t' + total.toFixed(2).replace('.', ',') + '\t');
  lines.push('\t\tÖDENDİ\t' + paid.toFixed(2).replace('.', ',') + '\t');
  lines.push('\t\tBEKLİYOR\t' + (total-paid).toFixed(2).replace('.', ',') + '\t');

  var csv = BOM + lines.join('\n');
  var blob = new Blob([csv], {type: 'text/tab-separated-values;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Odeme-Raporu-' + modeLabel.replace(/\s/g,'-') + '.xls';
  a.click();
  URL.revokeObjectURL(url);
  toast('Excel indirildi');
}


// ── Versiyon kontrolü — eski cache varsa temizle ve yenile ──
var APP_VERSION = '2025-06-29-v6';
var storedVersion = localStorage.getItem('app-version');
if (storedVersion && storedVersion !== APP_VERSION) {
  // Yeni versiyon gelmiş — cache temizle ve yenile
  localStorage.setItem('app-version', APP_VERSION);
  if ('caches' in window) {
    caches.keys().then(function(keys) {
      return Promise.all(keys.map(function(k) { return caches.delete(k); }));
    }).then(function() {
      window.location.reload(true);
    });
  } else {
    window.location.reload(true);
  }
} else {
  localStorage.setItem('app-version', APP_VERSION);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(function(reg) {
    // Yeni SW varsa hemen aktifleştir
    reg.addEventListener('updatefound', function() {
      var newSW = reg.installing;
      newSW.addEventListener('statechange', function() {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          // Yeni versiyon hazır — sayfayı yenile
          newSW.postMessage({type: 'SKIP_WAITING'});
          window.location.reload(true);
        }
      });
    });
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'GET_PAYMENTS') {}
    });
  }).catch(function() {});
}

// ── IndexedDB: sync payments so SW can read them ──────────
function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('odeme-db', 1);
    req.onupgradeneeded = function(e) {
      e.target.result.createObjectStore('payments', {keyPath: 'id'});
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = reject;
  });
}

function syncToIDB() {
  openDB().then(function(db) {
    var tx = db.transaction('payments', 'readwrite');
    var store = tx.objectStore('payments');
    store.put({id: 'all', data: JSON.stringify(payments)});
  }).catch(function() {});
}

// Override persist to also sync to IDB
var _origPersist = persist;
persist = function() {
  _origPersist();
  syncToIDB();
};

// ── Notification permission & scheduling ──────────────────
var notifPermission = 'default';

function requestNotifPermission() {
  if (!('Notification' in window)) {
    toast('Bu tarayıcı bildirimleri desteklemiyor');
    return;
  }
  Notification.requestPermission().then(function(result) {
    notifPermission = result;
    if (result === 'granted') {
      toast('Bildirimler açıldı! Her gün saat 09:00\'da hatırlatacak 🔔');
      // Tell SW to schedule
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({type: 'SCHEDULE'});
      }
      // Immediate check
      checkNotificationsNow();
      renderNotifBanner();
    } else {
      toast('Bildirim izni verilmedi');
      renderNotifBanner();
    }
  });
}

function checkNotificationsNow() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({type: 'CHECK_NOW'});
  }
}

function renderNotifBanner() {
  var banner = document.getElementById('notifBanner');
  if (!banner) return;
  var perm = 'Notification' in window ? Notification.permission : 'unsupported';

  if (perm === 'granted') {
    banner.innerHTML = '<div style="display:flex;align-items:center;gap:10px;">'
      + '<span style="font-size:18px;">🔔</span>'
      + '<div style="flex:1"><div style="font-size:13px;font-weight:800;">Bildirimler Açık</div>'
      + '<div style="font-size:11px;color:var(--sub);">Her gün saat 09:00\'da yaklaşan ödemeler için hatırlatma gelir</div></div>'
      + '<button type="button" onclick="checkNotificationsNow();toast(\'Kontrol yapılıyor...\');" style="background:var(--blue);color:#fff;border:none;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer;">Şimdi Kontrol Et</button>'
      + '</div>';
    banner.style.background = '#e9f9ee';
    banner.style.border = '1.5px solid #34c759';
  } else if (perm === 'denied') {
    banner.innerHTML = '<div style="display:flex;align-items:center;gap:10px;">'
      + '<span style="font-size:18px;">🔕</span>'
      + '<div style="flex:1"><div style="font-size:13px;font-weight:800;">Bildirimler Kapalı</div>'
      + '<div style="font-size:11px;color:var(--sub);">Tarayıcı ayarlarından bildirimlere izin verin</div></div>'
      + '</div>';
    banner.style.background = '#fff0ef';
    banner.style.border = '1.5px solid var(--red)';
  } else if (perm === 'unsupported') {
    banner.style.display = 'none';
  } else {
    banner.innerHTML = '<div style="display:flex;align-items:center;gap:10px;">'
      + '<span style="font-size:18px;">🔔</span>'
      + '<div style="flex:1"><div style="font-size:13px;font-weight:800;">Ödeme Hatırlatmaları</div>'
      + '<div style="font-size:11px;color:var(--sub);">Geciken ve yaklaşan ödemeler için bildirim al</div></div>'
      + '<button type="button" id="btnEnableNotif" style="background:var(--blue);color:#fff;border:none;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer;">Aç</button>'
      + '</div>';
    banner.style.background = 'var(--card)';
    banner.style.border = '1.5px solid var(--border)';
    document.getElementById('btnEnableNotif') &&
      document.getElementById('btnEnableNotif').addEventListener('click', requestNotifPermission);
  }
}

// ── Bildirim ayarları HTML (summary alanının altına eklenir) ──
function injectNotifBanner() {
  if (document.getElementById('notifBanner')) return;
  var banner = document.createElement('div');
  banner.id = 'notifBanner';
  banner.style.cssText = 'margin:10px 12px 0;border-radius:14px;padding:13px 14px;';
  // Insert after summary
  var summary = document.getElementById('summary');
  summary.parentNode.insertBefore(banner, summary.nextSibling);
  renderNotifBanner();
}

load();
syncToIDB();
render();
injectNotifBanner();

// Check notifications on app open (if permission already granted)
if ('Notification' in window && Notification.permission === 'granted') {
  setTimeout(checkNotificationsNow, 2000);
}
