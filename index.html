<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ödemeler">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#007aff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Odeme Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#ff3b30;--orange:#ff9500;--yellow:#f5a623;--green:#34c759;--blue:#007aff;--purple:#af52de;--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;--border:#e5e5ea;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;-webkit-tap-highlight-color:transparent;}
button{font-family:'Nunito',sans-serif;touch-action:manipulation;}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:48px 16px 12px;position:sticky;top:0;z-index:100;}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.header-title{font-size:22px;font-weight:900;}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;}
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:14px;padding:6px 4px;}
.mnav-btn{background:#fff;border:none;border-radius:10px;font-size:20px;cursor:pointer;padding:8px 16px;color:var(--blue);font-weight:900;}
.mnav-center{text-align:center;flex:1;}
.mnav-month{font-size:17px;font-weight:900;}
.mnav-year{font-size:12px;color:var(--sub);font-weight:700;}
.mnav-today{font-size:11px;color:var(--blue);font-weight:800;cursor:pointer;text-decoration:underline;margin-top:2px;min-height:16px;}
.summary{background:var(--card);margin:10px 12px 0;border-radius:16px;padding:14px 16px;}
.sum-label{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:6px;}
.sum-total{font-size:26px;font-weight:900;letter-spacing:-.5px;}
.sum-row{display:flex;gap:10px;margin-top:10px;}
.sum-chip{background:var(--bg);border-radius:10px;padding:7px 12px;flex:1;}
.sum-chip-val{font-size:15px;font-weight:900;}
.sum-chip-lbl{font-size:11px;color:var(--sub);font-weight:700;}
.bar-section{margin-top:12px;}
.bar-title{font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bar-emoji{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.bar-label{font-size:12px;font-weight:700;width:72px;flex-shrink:0;}
.bar-track{flex:1;background:var(--bg);border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;}
.bar-amt{font-size:12px;font-weight:800;color:var(--sub);width:64px;text-align:right;flex-shrink:0;}
.tabs{display:flex;gap:8px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:var(--card);color:var(--sub);border:none;border-radius:50px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.tab.active{background:var(--text);color:#fff;}
.list{padding:6px 12px;display:flex;flex-direction:column;gap:9px;}
.empty{text-align:center;color:var(--sub);padding:48px 20px;font-size:14px;font-weight:600;line-height:1.7;}
.empty .emoji{font-size:36px;display:block;margin-bottom:8px;}
.card{background:var(--card);border-radius:14px;border:2.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:11px;}
.card.paid{opacity:.5;}
.card.s-gecikti{border-color:var(--red);}
.card.s-bugun{border-color:var(--orange);}
.card.s-yaklasiyor{border-color:var(--yellow);}
.card-emoji{font-size:24px;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card.paid .card-name{text-decoration:line-through;color:var(--sub);}
.card-meta{font-size:11px;color:var(--sub);margin-top:2px;font-weight:600;}
.card-note{font-size:11px;color:var(--sub);margin-top:3px;font-weight:600;font-style:italic;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.badge{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:800;white-space:nowrap;}
.b-gecikti{background:var(--red);color:#fff;}
.b-bugun{background:var(--orange);color:#fff;}
.b-yaklasiyor{background:var(--yellow);color:#fff;}
.b-gelecek{background:var(--border);color:var(--sub);}
.b-odendi{background:#e9f9ee;color:var(--green);}
.type-tag{font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;display:inline-block;margin-bottom:2px;}
.tg-d{background:#eaf2ff;color:var(--blue);}
.tg-t{background:#f5eeff;color:var(--purple);}
.card-actions{display:flex;gap:5px;}
.btn-paid,.btn-edit,.btn-del{border:none;border-radius:9px;padding:6px 11px;font-size:11px;font-weight:800;cursor:pointer;}
.btn-paid{background:#e9f9ee;color:var(--green);}
.card.paid .btn-paid{background:var(--border);color:var(--sub);}
.btn-edit{background:#e8f0ff;color:var(--blue);}
.btn-del{background:#fff0ef;color:var(--red);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:22px 18px 44px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:900;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;}
.type-toggle{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:14px;}
.type-btn{flex:1;border:none;background:transparent;border-radius:9px;padding:9px 0;font-size:13px;font-weight:800;cursor:pointer;color:var(--sub);}
.type-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.field{margin-bottom:11px;}
.field label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:12px 13px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.field-row{display:flex;gap:9px;}
.field-row .field{flex:1;}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:5px;}
.month-chip{border:2px solid var(--border);background:var(--bg);border-radius:9px;padding:9px 2px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub);text-align:center;}
.month-chip.sel{border-color:var(--blue);background:var(--blue);color:#fff;}
.month-chip.always-sel{border-color:var(--purple);background:var(--purple);color:#fff;}
.month-hint{font-size:11px;color:var(--sub);margin-bottom:5px;font-weight:600;}
.btn-save{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
.reset-btn{display:block;background:var(--card);color:var(--blue);border:1.5px solid var(--border);border-radius:13px;padding:13px;font-size:13px;font-weight:800;cursor:pointer;width:calc(100% - 24px);margin:10px 12px 0;text-align:center;}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#fff;border-radius:18px;padding:22px 20px;width:100%;max-width:320px;text-align:center;}
.confirm-msg{font-size:15px;font-weight:700;margin-bottom:18px;line-height:1.4;}
.confirm-actions{display:flex;gap:10px;}
.confirm-btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;}
.confirm-cancel{background:var(--bg);color:var(--text);}
.confirm-ok{background:var(--red);color:#fff;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1c1e;color:#fff;padding:12px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="header-title">Ödemeler</div>
    <button type="button" id="btnOpenAdd" class="btn-add">+ Ekle</button>
  </div>
  <div class="month-nav">
    <button type="button" id="btnPrev" class="mnav-btn">&#8249;</button>
    <div class="mnav-center">
      <div class="mnav-month" id="mMonth"></div>
      <div class="mnav-year" id="mYear"></div>
      <div class="mnav-today" id="mToday"></div>
    </div>
    <button type="button" id="btnNext" class="mnav-btn">&#8250;</button>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="tabs">
  <button type="button" class="tab active" data-filter="all"Tümü/button>
  <button type="button" class="tab" data-filter="urgent">Acil</button>
  <button type="button" class="tab" data-filter="unpaid">Bekleyen</button>
  <button type="button" class="tab" data-filter="paid">Ödendi</button>
</div>

<div class="list" id="list"></div>
<button type="button" id="resetBtn" class="reset-btn" style="display:none">Bu Ayı Sıfırla</button>

<div class="overlay" id="addOv">
  <div class="modal">
    <div class="modal-title">Yeni Odeme <button type="button" id="btnCloseAdd" class="modal-close">X</button></div>
    <div class="type-toggle">
      <button type="button" id="addBtnD" class="type-btn active"Düzenli/button>
      <button type="button" id="addBtnT" class="type-btn">Tek Seferlik</button>
    </div>
    <div class="field">
      <label>Ödeme Adı</label>
      <input type="text" id="addName" placeholder="Ornek: Kira, Kredi Karti...">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Tutar (TL)</label>
        <input type="number" id="addAmt" placeholder="İsteğe Bağlı" inputmode="decimal">
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="addCat">
          <option value="kira">🏠 Kira</option>
          <option value="aidat">🏢 Aidat</option>
          <option value="okul">🎓 Okul</option>
          <option value="kredi">💳 Kredi Kartı</option>
          <option value="fatura">📄 Fatura</option>
          <option value="abonelik">📱 Abonelik</option>
          <option value="diger">📌 Diğer</option>
        </select>
      </div>
    </div>
    <div id="addDuzenli">
      <div class="field">
        <label>Her Ayın Kaçında?</label>
        <input type="number" id="addDay" min="1" max="31" placeholder="1-31" inputmode="numeric">
      </div>
      <div class="field">
        <label>Hangi Aylar?</label>
        <div class="month-hint">Sürekli = her ay | Diğer kutular = sadece o aylar</div>
        <div class="month-grid" id="addGrid"></div>
      </div>
    </div>
    <div id="addTek" style="display:none">
      <div class="field">
        <label>Ödeme Tarihi</label>
        <input type="date" id="addDate">
      </div>
    </div>
    <div class="field">
      <label>Not (İsteğe Bağlı)</label>
      <input type="text" id="addNote" placeholder="Örn: Ekstre belli olunca güncelle">
    </div>
    <button type="button" id="btnSaveAdd" class="btn-save">Kaydet</button>
  </div>
</div>

<div class="overlay" id="editOv">
  <div class="modal">
    <div class="modal-title">Duzenle <button type="button" id="btnCloseEdit" class="modal-close">X</button></div>
    <input type="hidden" id="editId">
    <div class="type-toggle">
      <button type="button" id="editBtnD" class="type-btn active"Düzenli/button>
      <button type="button" id="editBtnT" class="type-btn">Tek Seferlik</button>
    </div>
    <div class="field">
      <label>Ödeme Adı</label>
      <input type="text" id="editName">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Tutar (TL)</label>
        <input type="number" id="editAmt" inputmode="decimal">
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="editCat">
          <option value="kira">🏠 Kira</option>
          <option value="aidat">🏢 Aidat</option>
          <option value="okul">🎓 Okul</option>
          <option value="kredi">💳 Kredi Kartı</option>
          <option value="fatura">📄 Fatura</option>
          <option value="abonelik">📱 Abonelik</option>
          <option value="diger">📌 Diğer</option>
        </select>
      </div>
    </div>
    <div id="editDuzenli">
      <div class="field">
        <label>Her Ayın Kaçında?</label>
        <input type="number" id="editDay" min="1" max="31" inputmode="numeric">
      </div>
      <div class="field">
        <label>Hangi Aylar?</label>
        <div class="month-hint">Sürekli = her ay | Diğer kutular = sadece o aylar</div>
        <div class="month-grid" id="editGrid"></div>
      </div>
    </div>
    <div id="editTek" style="display:none">
      <div class="field">
        <label>Ödeme Tarihi</label>
        <input type="date" id="editDate">
      </div>
    </div>
    <div class="field">
      <label>Not (İsteğe Bağlı)</label>
      <input type="text" id="editNote">
    </div>
    <button type="button" id="btnSaveEdit" class="btn-save">Güncelle</button>
  </div>
</div>

<div class="confirm-overlay" id="confirmOv">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button type="button" id="confirmNo" class="confirm-btn confirm-cancel">Vazgeç</button>
      <button type="button" id="confirmYes" class="confirm-btn confirm-ok">Sil</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var EMJ = {kira:'🏠',aidat:'🏢',okul:'🎓',kredi:'💳',fatura:'📄',abonelik:'📱',diger:'📌'};
var CNMS = {kira:'Kira',aidat:'Aidat',okul:'Okul',kredi:'Kredi Kartı',fatura:'Fatura',abonelik:'Abonelik',diger:'Diğer'};
var CCLR = {kira:'#007aff',aidat:'#34c759',okul:'#ff9500',kredi:'#ff3b30',fatura:'#af52de',abonelik:'#5ac8fa',diger:'#8e8e93'};
var MO = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
var MOFULL = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
var KEY = 'odeme-v8';

var payments = [];
var filt = 'all';
var addType = 'd';
var editType = 'd';
var addSel = new Set();
var editSel = new Set();
var viewYear = new Date().getFullYear();
var viewMonth = new Date().getMonth();
var confirmCB = null;
var toastTimer = null;

function load() {
  try { payments = JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e) { payments = []; }
  if (!Array.isArray(payments)) payments = [];
}

function persist() {
  try { localStorage.setItem(KEY, JSON.stringify(payments)); }
  catch(e) { toast('Kaydetme hatası'); }
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function pkey(yr, mo) { return yr + '-' + mo; }

function isPaid(p, yr, mo) {
  return !!(p.paidMonths && p.paidMonths[pkey(yr, mo)]);
}

function setPaid(p, yr, mo, val) {
  if (!p.paidMonths) p.paidMonths = {};
  if (val) p.paidMonths[pkey(yr, mo)] = true;
  else delete p.paidMonths[pkey(yr, mo)];
}

function getStatus(p, yr, mo) {
  if (p.type === 't') {
    var d = new Date(p.date + 'T00:00:00');
    if (d.getFullYear() !== yr || d.getMonth() !== mo) return null;
    if (isPaid(p, yr, mo)) return 'odendi';
    var now = new Date(); now.setHours(0,0,0,0);
    var due = new Date(yr, mo, d.getDate()); due.setHours(0,0,0,0);
    var df = Math.round((due - now) / 86400000);
    if (df < 0) return 'gecikti';
    if (df === 0) return 'bugun';
    if (df <= 3) return 'yaklasiyor';
    return 'gelecek';
  }
  var inMo = p.months === 'always' ? true : (Array.isArray(p.months) && p.months.indexOf(mo) >= 0);
  if (!inMo) return null;
  if (isPaid(p, yr, mo)) return 'odendi';
  var now2 = new Date(); now2.setHours(0,0,0,0);
  var due2 = new Date(yr, mo, p.dueDay); due2.setHours(0,0,0,0);
  var df2 = Math.round((due2 - now2) / 86400000);
  if (df2 < 0) return 'gecikti';
  if (df2 === 0) return 'bugun';
  if (df2 <= 3) return 'yaklasiyor';
  return 'gelecek';
}

function metaTxt(p) {
  if (p.type === 't') {
    var d = new Date(p.date + 'T00:00:00');
    return d.getDate() + ' ' + MO[d.getMonth()] + ' ' + d.getFullYear();
  }
  var ml = p.months === 'always' ? 'Sürekli' : p.months.map(function(m) { return MO[m]; }).join(', ');
  return 'Her ayın ' + p.dueDay + '. günü - ' + ml;
}

function blabel(s) {
  var map = {gecikti:'Gecikti!',bugun:'Bugün!',yaklasiyor:'Yaklasıyor',gelecek:'Zamanında',odendi:'Ödendi'};
  return map[s] || '';
}

function esc(t) {
  return String(t == null ? '' : t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmt(n) {
  var num = Number(n);
  if (isNaN(num)) return '0';
  return num.toLocaleString('tr-TR');
}

function monthPayments() {
  return payments.filter(function(p) {
    return getStatus(p, viewYear, viewMonth) !== null;
  });
}

function renderSummary() {
  var mp = monthPayments();
  var total = 0, paid = 0;
  var cats = {};
  mp.forEach(function(p) {
    var a = parseFloat(p.amount) || 0;
    total += a;
    if (isPaid(p, viewYear, viewMonth)) paid += a;
    var c = p.category || 'diger';
    cats[c] = (cats[c] || 0) + a;
  });
  var unpaid = total - paid;
  var el = document.getElementById('summary');
  if (mp.length === 0) {
    el.innerHTML = '<div class="sum-label">' + MOFULL[viewMonth] + ' ' + viewYear + '</div><div style="font-size:13px;color:var(--sub);font-weight:600;">Bu ay odeme yok</div>';
    return;
  }
  var html = '<div class="sum-label">' + MOFULL[viewMonth] + ' ' + viewYear + ' - ' + mp.length + ' odeme</div>';
  if (total > 0) {
    html += '<div class="sum-total">' + fmt(total) + ' TL</div>';
    html += '<div class="sum-row">';
    html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--green)">' + fmt(paid) + ' TL</div><div class="sum-chip-lbl">Ödendi</div></div>';
    html += '<div class="sum-chip"><div class="sum-chip-val" style="color:var(--red)">' + fmt(unpaid) + ' TL</div><div class="sum-chip-lbl">Bekliyor</div></div>';
    html += '</div>';
    var catArr = Object.keys(cats).filter(function(c) { return cats[c] > 0; }).sort(function(a,b) { return cats[b] - cats[a]; });
    if (catArr.length > 0) {
      html += '<div class="bar-section"><div class="bar-title">Kategori Dagilimi</div>';
      catArr.forEach(function(c) {
        var pct = Math.round((cats[c] / total) * 100);
        html += '<div class="bar-item">';
        html += '<span class="bar-emoji">' + (EMJ[c] || '📌') + '</span>';
        html += '<span class="bar-label">' + esc(CNMS[c] || c) + '</span>';
        html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (CCLR[c] || '#888') + '"></div></div>';
        html += '<span class="bar-amt">' + fmt(cats[c]) + ' TL</span>';
        html += '</div>';
      });
      html += '</div>';
    }
  } else {
    html += '<div style="font-size:13px;color:var(--sub);font-weight:600;">' + mp.length + ' odeme - tutar girilmemis</div>';
  }
  el.innerHTML = html;
}

function renderList() {
  var mp = monthPayments();
  var order = {gecikti:0,bugun:1,yaklasiyor:2,gelecek:3,odendi:4};
  var list = mp.slice().sort(function(a,b) {
    var sa = order[getStatus(a, viewYear, viewMonth)];
    var sb = order[getStatus(b, viewYear, viewMonth)];
    return (sa === undefined ? 3 : sa) - (sb === undefined ? 3 : sb);
  });
  if (filt === 'urgent') list = list.filter(function(p) { var s = getStatus(p,viewYear,viewMonth); return s==='gecikti'||s==='bugun'||s==='yaklasiyor'; });
  else if (filt === 'unpaid') list = list.filter(function(p) { return getStatus(p,viewYear,viewMonth) !== 'odendi'; });
  else if (filt === 'paid') list = list.filter(function(p) { return getStatus(p,viewYear,viewMonth) === 'odendi'; });
  var el = document.getElementById('list');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty"><span class="emoji">' + (payments.length===0?'📋':'🔍') + '</span>' + (payments.length===0?'Ödeme yok.<br>"+ Ekle" ile başlayın.':MOFULL[viewMonth]+' ayında bu filtrede ödeme yok.') + '</div>';
    return;
  }
  var html = '';
  list.forEach(function(p) {
    var s = getStatus(p, viewYear, viewMonth);
    var paid = isPaid(p, viewYear, viewMonth);
    var amtTxt = p.amount ? ' · <strong>' + fmt(p.amount) + ' TL</strong>' : '';
    var ttag = p.type === 'd' ? '<span class="type-tag tg-d"Düzenli/span>' : '<span class="type-tag tg-t">Tek Seferlik</span>';
    var noteHtml = p.note ? '<div class="card-note">Not: ' + esc(p.note) + '</div>' : '';
    html += '<div class="card ' + (paid ? 'paid' : '') + ' ' + (paid ? '' : 's-' + s) + '" data-id="' + esc(p.id) + '">';
    html += '<span class="card-emoji">' + (EMJ[p.category] || '📌') + '</span>';
    html += '<div class="card-info">' + ttag + '<div class="card-name">' + esc(p.name) + '</div>';
    html += '<div class="card-meta">' + metaTxt(p) + amtTxt + '</div>' + noteHtml + '</div>';
    html += '<div class="card-right"><span class="badge b-' + s + '">' + blabel(s) + '</span>';
    html += '<div class="card-actions">';
    html += '<button type="button" class="btn-paid" data-action="paid" data-id="' + esc(p.id) + '">' + (paid ? 'Geri Al' : 'Ödendi') + '</button>';
    html += '<button type="button" class="btn-edit" data-action="edit" data-id="' + esc(p.id) + '">Düzenle</button>';
    html += '<button type="button" class="btn-del" data-action="del" data-id="' + esc(p.id) + '">Sil</button>';
    html += '</div></div></div>';
  });
  el.innerHTML = html;
}

function render() {
  var isNow = viewYear === new Date().getFullYear() && viewMonth === new Date().getMonth();
  document.getElementById('mMonth').textContent = MOFULL[viewMonth];
  document.getElementById('mYear').textContent = viewYear;
  document.getElementById('mToday').textContent = isNow ? '' : 'Bugüne dön';
  renderSummary();
  renderList();
  var mp = monthPayments();
  var hasPaid = mp.some(function(p) { return isPaid(p, viewYear, viewMonth); });
  document.getElementById('resetBtn').style.display = hasPaid ? 'block' : 'none';
}

function buildGrid(gridId, selSet) {
  var g = document.getElementById(gridId);
  g.innerHTML = '';
  var ac = document.createElement('button');
  ac.type = 'button';
  ac.className = 'month-chip' + (selSet.has('always') ? ' always-sel' : '');
  ac.textContent = 'Sürekli';
  ac.setAttribute('data-val', 'always');
  g.appendChild(ac);
  MO.forEach(function(m, i) {
    var chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'month-chip' + ((selSet.has(i) && !selSet.has('always')) ? ' sel' : '');
    chip.textContent = m;
    chip.setAttribute('data-val', String(i));
    g.appendChild(chip);
  });
}

function handleGrid(e, selSet, gridId) {
  var btn = e.target.closest('.month-chip');
  if (!btn) return;
  var val = btn.getAttribute('data-val');
  if (val === 'always') {
    if (selSet.has('always')) selSet.clear();
    else { selSet.clear(); selSet.add('always'); }
  } else {
    var idx = parseInt(val, 10);
    if (selSet.has('always')) selSet.clear();
    if (selSet.has(idx)) selSet.delete(idx);
    else selSet.add(idx);
  }
  buildGrid(gridId, selSet);
}

function openAdd() {
  addSel = new Set([viewMonth]);
  addType = 'd';
  document.getElementById('addBtnD').classList.add('active');
  document.getElementById('addBtnT').classList.remove('active');
  document.getElementById('addDuzenli').style.display = '';
  document.getElementById('addTek').style.display = 'none';
  document.getElementById('addName').value = '';
  document.getElementById('addDay').value = '';
  document.getElementById('addAmt').value = '';
  document.getElementById('addNote').value = '';
  document.getElementById('addDate').value = new Date(viewYear, viewMonth, 1).toISOString().split('T')[0];
  buildGrid('addGrid', addSel);
  document.getElementById('addOv').classList.add('open');
}

function closeAdd() { document.getElementById('addOv').classList.remove('open'); }

function saveAdd() {
  var nm = document.getElementById('addName').value.trim();
  if (!nm) { toast('Lütfen ödeme adı girin'); return; }
  var p = {
    id: 'p' + Date.now() + Math.random().toString(36).slice(2,6),
    name: nm,
    amount: document.getElementById('addAmt').value.trim(),
    category: document.getElementById('addCat').value,
    note: document.getElementById('addNote').value.trim(),
    type: addType,
    paidMonths: {}
  };
  if (addType === 'd') {
    var day = parseInt(document.getElementById('addDay').value, 10);
    if (isNaN(day) || day < 1 || day > 31) { toast('Geçerli bir gün girin (1-31)'); return; }
    if (addSel.size === 0) { toast('En az bir ay seçin veya Sürekli işaretleyin'); return; }
    p.dueDay = day;
    p.months = addSel.has('always') ? 'always' : Array.from(addSel).sort(function(a,b) { return a-b; });
  } else {
    var dt = document.getElementById('addDate').value;
    if (!dt) { toast('Lütfen tarih seçin'); return; }
    p.date = dt;
  }
  payments.push(p);
  persist();
  render();
  closeAdd();
  toast('Ödeme eklendi');
}

function openEdit(id) {
  var p = payments.find(function(x) { return x.id === id; });
  if (!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('editName').value = p.name;
  document.getElementById('editAmt').value = p.amount || '';
  document.getElementById('editCat').value = p.category;
  document.getElementById('editNote').value = p.note || '';
  editType = p.type;
  document.getElementById('editBtnD').classList.toggle('active', editType === 'd');
  document.getElementById('editBtnT').classList.toggle('active', editType === 't');
  document.getElementById('editDuzenli').style.display = editType === 'd' ? '' : 'none';
  document.getElementById('editTek').style.display = editType === 't' ? '' : 'none';
  if (p.type === 'd') {
    document.getElementById('editDay').value = p.dueDay;
    editSel = p.months === 'always' ? new Set(['always']) : new Set(p.months);
  } else {
    document.getElementById('editDate').value = p.date;
    editSel = new Set();
  }
  buildGrid('editGrid', editSel);
  document.getElementById('editOv').classList.add('open');
}

function closeEdit() { document.getElementById('editOv').classList.remove('open'); }

function saveEdit() {
  var id = document.getElementById('editId').value;
  var nm = document.getElementById('editName').value.trim();
  if (!nm) { toast('Lütfen ödeme adı girin'); return; }
  var idx = payments.findIndex(function(x) { return x.id === id; });
  if (idx === -1) return;
  var orig = payments[idx];
  var u = {
    id: orig.id,
    name: nm,
    amount: document.getElementById('editAmt').value.trim(),
    category: document.getElementById('editCat').value,
    note: document.getElementById('editNote').value.trim(),
    type: editType,
    paidMonths: Object.assign({}, orig.paidMonths || {})
  };
  if (editType === 'd') {
    var day = parseInt(document.getElementById('editDay').value, 10);
    if (isNaN(day) || day < 1 || day > 31) { toast('Geçerli bir gün girin'); return; }
    if (editSel.size === 0) { toast('En az bir ay seçin'); return; }
    u.dueDay = day;
    u.months = editSel.has('always') ? 'always' : Array.from(editSel).sort(function(a,b) { return a-b; });
  } else {
    var dt = document.getElementById('editDate').value;
    if (!dt) { toast('Lütfen tarih seçin'); return; }
    u.date = dt;
  }
  payments[idx] = u;
  persist();
  render();
  closeEdit();
  toast('Ödeme güncellendi');
}

function togPaid(id) {
  var idx = payments.findIndex(function(p) { return p.id === id; });
  if (idx === -1) return;
  var p = payments[idx];
  var u = Object.assign({}, p, {paidMonths: Object.assign({}, p.paidMonths || {})});
  setPaid(u, viewYear, viewMonth, !isPaid(u, viewYear, viewMonth));
  payments[idx] = u;
  persist();
  render();
}

function delPayment(id) {
  var before = payments.length;
  payments = payments.filter(function(p) { return p.id !== id; });
  if (payments.length < before) {
    persist();
    render();
    toast('Ödeme silindi');
  }
}

function showConfirm(msg, okLabel, cb) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmYes').textContent = okLabel || 'Sil';
  confirmCB = cb;
  document.getElementById('confirmOv').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOv').classList.remove('open');
  confirmCB = null;
}

// EVENT LISTENERS
document.getElementById('btnOpenAdd').addEventListener('click', openAdd);
document.getElementById('btnCloseAdd').addEventListener('click', closeAdd);
document.getElementById('btnSaveAdd').addEventListener('click', saveAdd);
document.getElementById('btnCloseEdit').addEventListener('click', closeEdit);
document.getElementById('btnSaveEdit').addEventListener('click', saveEdit);

document.getElementById('btnPrev').addEventListener('click', function() {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
});

document.getElementById('btnNext').addEventListener('click', function() {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
});

document.getElementById('mToday').addEventListener('click', function() {
  viewYear = new Date().getFullYear();
  viewMonth = new Date().getMonth();
  render();
});

document.getElementById('resetBtn').addEventListener('click', function() {
  showConfirm(MOFULL[viewMonth] + ' ' + viewYear + ' ayı sıfırlanacak. Devam?', 'Sıfırla', function() {
    payments = payments.map(function(p) {
      if (getStatus(p, viewYear, viewMonth) === null) return p;
      var u = Object.assign({}, p, {paidMonths: Object.assign({}, p.paidMonths || {})});
      setPaid(u, viewYear, viewMonth, false);
      return u;
    });
    persist();
    render();
    toast('Ay sıfırlandı');
  });
});

document.getElementById('addOv').addEventListener('click', function(e) { if (e.target.id === 'addOv') closeAdd(); });
document.getElementById('editOv').addEventListener('click', function(e) { if (e.target.id === 'editOv') closeEdit(); });
document.getElementById('confirmOv').addEventListener('click', function(e) { if (e.target.id === 'confirmOv') closeConfirm(); });

document.getElementById('confirmNo').addEventListener('click', closeConfirm);
document.getElementById('confirmYes').addEventListener('click', function() {
  var cb = confirmCB;
  closeConfirm();
  if (cb) cb();
});

document.getElementById('addBtnD').addEventListener('click', function() {
  addType = 'd';
  document.getElementById('addBtnD').classList.add('active');
  document.getElementById('addBtnT').classList.remove('active');
  document.getElementById('addDuzenli').style.display = '';
  document.getElementById('addTek').style.display = 'none';
});

document.getElementById('addBtnT').addEventListener('click', function() {
  addType = 't';
  document.getElementById('addBtnT').classList.add('active');
  document.getElementById('addBtnD').classList.remove('active');
  document.getElementById('addTek').style.display = '';
  document.getElementById('addDuzenli').style.display = 'none';
});

document.getElementById('editBtnD').addEventListener('click', function() {
  editType = 'd';
  document.getElementById('editBtnD').classList.add('active');
  document.getElementById('editBtnT').classList.remove('active');
  document.getElementById('editDuzenli').style.display = '';
  document.getElementById('editTek').style.display = 'none';
});

document.getElementById('editBtnT').addEventListener('click', function() {
  editType = 't';
  document.getElementById('editBtnT').classList.add('active');
  document.getElementById('editBtnD').classList.remove('active');
  document.getElementById('editTek').style.display = '';
  document.getElementById('editDuzenli').style.display = 'none';
});

document.getElementById('addGrid').addEventListener('click', function(e) { handleGrid(e, addSel, 'addGrid'); });
document.getElementById('editGrid').addEventListener('click', function(e) { handleGrid(e, editSel, 'editGrid'); });

document.getElementById('list').addEventListener('click', function(e) {
  var btn = e.target.closest('button[data-action]');
  if (!btn) return;
  var action = btn.getAttribute('data-action');
  var id = btn.getAttribute('data-id');
  if (!id) return;
  if (action === 'paid') {
    togPaid(id);
  } else if (action === 'edit') {
    openEdit(id);
  } else if (action === 'del') {
    var p = payments.find(function(x) { return x.id === id; });
    var nm = p ? p.name : 'Bu odeme';
    showConfirm('"' + nm + '" silinecek. Geri alınamaz.', 'Sil', function() {
      delPayment(id);
    });
  }
});

document.querySelectorAll('.tab').forEach(function(tb) {
  tb.addEventListener('click', function() {
    filt = tb.getAttribute('data-filter');
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    tb.classList.add('active');
    render();
  });
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}

load();
render();
</script>
</body>
</html>
